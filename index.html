      window.global = window;
      window.process = { env: { NODE_ENV: 'development' } };
      
      // Prevent libraries from crashing when trying to overwrite fetch
      (function() {
        const originalFetch = window.fetch;
        if (typeof originalFetch === 'function') {
          try {
            Object.defineProperty(window, 'fetch', {
              get() { return originalFetch; },
              set(v) { console.warn('A library tried to overwrite window.fetch. This was prevented to avoid crashes.'); },
              configurable: true,
              enumerable: true
            });
          } catch (e) {
            // If we can't redefine it, it might already be locked down by the environment
            console.warn('Could not redefine window.fetch:', e);
          }
        }
      })();
